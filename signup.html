<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EasyTest</title>
    <script src="path/to/app.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7fc;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #3498db;
            font-size: 2em;
        }

        label {
            display: block;
            margin-top: 15px;
            color: #333;
            font-size: 1.2em;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1.2em;
        }

        input[type="submit"],
        input[type="button"] {
            background-color: #3498db;
            color: #fff;
            cursor: pointer;
            font-size: 1.4em;
            border-radius: 8px;
        }

        input[type="submit"]:hover,
        input[type="button"]:hover {
            background-color: #217dbb;
        }

        p {
            color: #777;
            font-size: 1.2em;
        }

        a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
        }

        a:hover {
            text-decoration: underline;
        }

        .login-link {
            text-align: center;
        }

        .login-link button {
            background-color: #3498db;
            color: #fff;
            cursor: pointer;
            font-size: 1.4em;
            padding: 12px;
            border: none;
            border-radius: 8px;
            margin-top: 15px;
            display: inline-block; /* Display inline to be centered */
        }

        .login-link button:hover {
            background-color: #217dbb;
        }
    </style>
</head>

<body>
    <div class="container">
        <form method="post" action="/signup">
            <h1>Sign Up</h1>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <br>
            <label for="confirm_password">Confirm Password:</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
            <br>
            <input type="submit" value="Sign Up">
        </form>

        <!-- Login button -->
        <div class="login-link">
            <a href="login.html">
                <button type="button" onclick="redirectToLogin()">Already have an account? Login</button>
            </a>
        </div>
    </div>
</body>

</html>
