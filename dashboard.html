<!-- dashboard.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - EasyTest</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7fc;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #3498db;
            padding: 20px;
            color: #fff;
            text-align: center;
            font-size: 500%;
        }

        section {
            margin: 20px;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #3498db;
            font-size: 300%;
        }

        ul {
            list-style: none;
            padding: 0;
            font-size: 200%;
        }

        li {
            margin-bottom: 10px;
        }

        a {
            color: #3498db;
            text-decoration: none;
            margin-right: 20px;
        }

        a:hover {
            text-decoration: underline;
        }

        .create-test {
            margin-top: 20px;
        }

        .create-test a {
            display: inline-block;
            padding: 15px 30px;
            font-size: 150%;
            text-align: center;
            text-decoration: none;
            color: #fff;
            background-color: #4caf50;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .create-test a:hover {
            background-color: #45a049;
        }

        .logout-btn {
            display: inline-block;
            padding: 15px 30px;
            font-size: 150%;
            text-align: center;
            text-decoration: none;
            color: #fff;
            background-color: #e74c3c;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>

<body>
    <header>
        <h1>Welcome, {{ username }}!</h1>
    </header>

    <section>
        <h2>Your Tests:</h2>
        <ul>
            <!-- Display existing tests -->
            {% for test in tests %}
                <li>{{ test }}</li>
            {% endfor %}
        </ul>

        <!-- Create new test button -->
        <div class="create-test">
            <a href="{{ url_for('create_test') }}">Create New Test</a>
        </div>

        <!-- Logout button -->
        <a href="login.html">
            <button class="logout-btn" onclick="redirectToLogin()">Logout</button>
        </a>
    </section>
</body>

</html>
